name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy Docker
        run: |
          cd /home/varun/devops-practice/pipeline-fullstack-application

          git pull origin main

          docker compose down

          docker compose up -d --build