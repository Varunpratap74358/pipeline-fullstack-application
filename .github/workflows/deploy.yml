name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Deploy
        run: |
          cd /home/varun/devops-practice/pipeline-fullstack-application

          git fetch --all
          git reset --hard origin/main

          docker compose down || true
          docker compose up -d --build