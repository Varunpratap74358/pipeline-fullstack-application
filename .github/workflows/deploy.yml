name: Deploy

on:
  push:
    branches:
      - main

jobs:

  deploy:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout

        uses: actions/checkout@v4

      - name: Deploy to Ubuntu

        uses: appleboy/ssh-action@master

        with:

          host: ${{ secrets.HOST }}

          username: ${{ secrets.USERNAME }}

          key: ${{ secrets.SSH_KEY }}

          script: |

            cd /home/varun/devops-practice/pipeline-fullstack-application

            git pull origin main

            docker compose down

            docker compose build

            docker compose up -d