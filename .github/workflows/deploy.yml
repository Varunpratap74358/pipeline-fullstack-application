name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Runner
        run: |
          whoami
          pwd
          ls -la

      - name: Deploy Docker
        run: |
          cd /home/varun/devops-practice/pipeline-fullstack-application

          docker compose down || true

          docker compose up -d --build