version: "3.9"

services:
  backend:
    build:
      context: ./backend

    container_name: pipeline-backend

    restart: always

    ports:
      - "5001:8080"

    environment:
      NODE_ENV: production

    networks:
      - appnetwork

  frontend:
    build:
      context: ./frontend

    container_name: pipeline-frontend

    restart: always

    depends_on:
      - backend

    ports:
      - "3001:80"

    networks:
      - appnetwork

networks:
  appnetwork: