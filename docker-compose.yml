version: "3.9"

services:

  backend:

    build:
      context: ./backend

    container_name: backend

    restart: always

    ports:
      - "8081:8081"

    environment:
      NODE_ENV: production

    networks:
      - appnetwork

  frontend:

    build:
      context: ./frontend

    container_name: frontend

    restart: always

    depends_on:
      - backend

    ports:
      - "80:80"

    networks:
      - appnetwork

networks:

  appnetwork:
